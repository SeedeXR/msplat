name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  version-check:
    name: Version sync
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION, pyproject.toml, __init__.py match
        run: |
          V_FILE=$(cat VERSION | tr -d '[:space:]')
          V_TOML=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          V_INIT=$(grep '^__version__ = ' python/msplat/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "VERSION:      $V_FILE"
          echo "pyproject:    $V_TOML"
          echo "__init__.py:  $V_INIT"
          if [ "$V_FILE" != "$V_TOML" ] || [ "$V_FILE" != "$V_INIT" ]; then
            echo "::error::Version mismatch — update VERSION, pyproject.toml, and __init__.py"
            exit 1
          fi

  build-cpp:
    name: C++ CLI
    runs-on: macos-15
    needs: version-check
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # fetch the garden dataset for the piped smoke test

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DMSPLAT_BUILD_TESTS=ON
          cmake --build build -j

      - name: Verify outputs
        run: |
          test -f build/msplat
          test -f build/libmsplat_core.a
          test -f build/default.metallib

      - name: C++ unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Piped CLI smoke (off-TTY progress + PLY output)
        run: |
          SCENE=datasets/mipnerf360/garden
          if [ ! -f "$SCENE/sparse/0/cameras.bin" ]; then
            echo "garden dataset not present (LFS) — skipping piped smoke"; exit 0
          fi
          # Piped (no TTY): assert jsonl progress streams, exit 0, PLY written.
          out=$(./build/msplat "$SCENE" -n 30 -d 8 --progress-format jsonl -o /tmp/smoke.ply | tee /dev/stderr)
          echo "$out" | grep -q '"step":30' || { echo "::error::no jsonl progress line"; exit 1; }
          test -s /tmp/smoke.ply || { echo "::error::no PLY written"; exit 1; }
          echo "piped smoke OK"

      - name: Man-page coverage (every CLI option is documented)
        run: |
          # roff escapes hyphens as "\-"; strip backslashes before matching.
          man_plain=$(sed 's/\\//g' docs/msplat.1)
          missing=0
          for opt in $(./build/msplat --help | grep -oE '\-\-[a-z][a-z0-9-]+' | sort -u); do
            if ! grep -qF -- "$opt" <<<"$man_plain"; then
              echo "::error::CLI option $opt is missing from docs/msplat.1"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - uses: actions/upload-artifact@v4
        with:
          name: msplat-cli
          path: build/msplat
          if-no-files-found: error
          retention-days: 7

  build-test-python:
    name: Python ${{ matrix.python }}
    runs-on: macos-15
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Build wheel
        run: uv build --wheel --python ${{ matrix.python }}

      - name: Install and test
        run: |
          uv venv .test-venv --python ${{ matrix.python }}
          WHEEL=$(ls dist/*.whl)
          uv pip install --python .test-venv/bin/python "${WHEEL}" pytest
          .test-venv/bin/python -m pytest tests/ -x -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-test-swift:
    name: Swift Package
    runs-on: macos-15
    needs: version-check
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Build XCFramework
        run: bash scripts/build-xcframework.sh

      - name: Build & test
        run: |
          cd swift
          swift build
          swift test
